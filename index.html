<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>售前信息管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100">
    <!-- 登录/注册界面 -->
    <div id="authPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6">售前信息管理系统</h2>
            
            <!-- 登录表单 -->
            <div id="loginForm">
                <div id="loginErr" class="text-red-500 text-sm mb-3 hidden"></div>
                <input id="loginUser" placeholder="用户名" class="w-full p-3 border rounded-lg mb-3" required>
                <input id="loginPwd" placeholder="密码" type="password" class="w-full p-3 border rounded-lg mb-4" required>
                <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-medium hover:bg-blue-700">登录</button>
                <div class="text-center mt-4 text-sm text-gray-600">
                    没有账号？<button onclick="showRegister()" class="text-blue-600">去注册</button>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="hidden">
                <div id="regErr" class="text-red-500 text-sm mb-3 hidden"></div>
                <div id="regOk" class="text-green-500 text-sm mb-3 hidden"></div>
                <input id="regUser" placeholder="设置用户名" class="w-full p-3 border rounded-lg mb-3" required>
                <input id="regPwd" placeholder="设置密码（至少6位）" type="password" class="w-full p-3 border rounded-lg mb-3" required minlength="6">
                <input id="regPwd2" placeholder="确认密码" type="password" class="w-full p-3 border rounded-lg mb-4" required>
                <button onclick="doRegister()" class="w-full bg-green-600 text-white p-3 rounded-lg font-medium hover:bg-green-700">注册</button>
                <div class="text-center mt-4 text-sm text-gray-600">
                    已有账号？<button onclick="showLogin()" class="text-blue-600">返回登录</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 主系统界面 -->
    <div id="mainPage" class="hidden p-4 max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">项目信息管理</h1>
            <div class="flex items-center gap-3">
                <span id="userDisplay" class="text-gray-600"></span>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">退出登录</button>
            </div>
        </div>

        <form id="projectForm" class="bg-white rounded-xl p-6 shadow mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目名称 *</label>
                    <input name="projectName" class="w-full p-3 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">业主单位</label>
                    <input name="ownerName" class="w-full p-3 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目金额（万元）</label>
                    <input name="amount" type="number" class="w-full p-3 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目阶段</label>
                    <select name="stage" class="w-full p-3 border rounded-lg">
                        <option value="信息收集">信息收集</option>
                        <option value="方案设计">方案设计</option>
                        <option value="投标报价">投标报价</option>
                        <option value="已中标">已中标</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目概述</label>
                    <textarea name="summary" rows="3" class="w-full p-3 border rounded-lg"></textarea>
                </div>
            </div>
        </form>

        <div class="flex gap-3">
            <button onclick="resetForm()" class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600">重置表单</button>
            <button onclick="exportExcel()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">导出Excel</button>
        </div>
    </div>

    <script>
        // ========== 你的Supabase配置（不用改） ==========
        const SUPABASE_URL = "https://ulrrbwvxuihrslweqrle.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVscnJid3Z4dWlocnNsd2VxcmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTU2MjgsImV4cCI6MjA5MjYzMTYyOH0.FPXSLccJOopap323fjND8Xmtoal_cg8ir7wYt2Faol8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ========== 界面切换 ==========
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // ========== 注册（纯用户名+密码，自动生成假邮箱） ==========
        async function doRegister() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPwd').value;
            const password2 = document.getElementById('regPwd2').value;
            const errEl = document.getElementById('regErr');
            const okEl = document.getElementById('regOk');

            errEl.classList.add('hidden');
            okEl.classList.add('hidden');

            if (!username || !password) {
                errEl.textContent = '用户名和密码不能为空';
                errEl.classList.remove('hidden');
                return;
            }
            if (password !== password2) {
                errEl.textContent = '两次密码不一致';
                errEl.classList.remove('hidden');
                return;
            }
            if (password.length < 6) {
                errEl.textContent = '密码至少6位';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                // 自动生成假邮箱，绕过邮箱验证
                const fakeEmail = `${username}@user.local`;
                const { error } = await supabase.auth.signUp({
                    email: fakeEmail,
                    password: password,
                    options: {
                        data: { username: username } // 保存用户名
                    }
                });

                if (error) throw error;

                okEl.textContent = '注册成功！2秒后返回登录';
                okEl.classList.remove('hidden');
                setTimeout(showLogin, 2000);
            } catch (err) {
                errEl.textContent = err.message || '注册失败';
                errEl.classList.remove('hidden');
            }
        }

        // ========== 登录（纯用户名+密码） ==========
        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPwd').value;
            const errEl = document.getElementById('loginErr');

            errEl.classList.add('hidden');

            if (!username || !password) {
                errEl.textContent = '用户名和密码不能为空';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                // 自动把用户名拼成假邮箱登录
                const fakeEmail = `${username}@user.local`;
                const { error } = await supabase.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) throw error;
            } catch (err) {
                errEl.textContent = '用户名或密码错误';
                errEl.classList.remove('hidden');
            }
        }

        // ========== 主系统功能 ==========
        function resetForm() {
            if (confirm('确定要重置表单吗？')) {
                document.getElementById('projectForm').reset();
            }
        }

        function exportExcel() {
            const formData = new FormData(document.getElementById('projectForm'));
            const projectName = formData.get('projectName') || '未命名项目';
            
            const data = [['字段', '内容']];
            for (const [key, value] of formData.entries()) {
                data.push([key, value]);
            }

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '项目信息');
            XLSX.writeFile(wb, `${projectName}_项目信息.xlsx`);
            alert('导出成功！');
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                supabase.auth.signOut();
                document.getElementById('authPage').classList.remove('hidden');
                document.getElementById('mainPage').classList.add('hidden');
            }
        }

        // ========== 监听登录状态 ==========
        supabase.auth.onAuthStateChange((event, session) => {
            if (session?.user) {
                // 登录成功，切换到主界面
                document.getElementById('authPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                document.getElementById('userDisplay').textContent = `当前用户：${session.user.user_metadata.username}`;
            } else {
                // 未登录，显示登录界面
                document.getElementById('authPage').classList.remove('hidden');
                document.getElementById('mainPage').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
